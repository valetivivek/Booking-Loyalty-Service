# Test profile: H2 in-memory DB + in-memory cache, so tests need no
# Postgres/Redis/Docker. Schema is created from the JPA entities.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

  flyway:
    enabled: false

  cache:
    type: simple

jwt:
  secret: test-secret-test-secret-test-secret-test-secret-0123456789
  expiration-ms: 3600000
